<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BKLOGINS</title>
    <style>
        :root {
            --bg-principal: #141414;  /* Preto Netflix */
            --bg-card: #181818;       /* Cinza escuro dos cards */
            --texto-principal: #ffffff;
            --texto-secundario: #aaaaaa;
            --netflix-red: #e50914;   /* Vermelho oficial */
            --netflix-red-hover: #b80710;
            --borda: #2f2f2f;
            --input-bg: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Topo com Identidade Visual */
        .header-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--borda);
            padding-bottom: 15px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--netflix-red);
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--texto-principal);
        }

        /* Áreas de Texto */
        textarea {
            width: 100%;
            height: 100px;
            padding: 14px;
            border: 1px solid transparent;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--texto-principal);
            resize: vertical;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--texto-secundario);
            background-color: #454545;
        }

        /* Estrutura de Duas Colunas */
        .grid-insercao {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .grid-insercao { grid-template-columns: 1fr; }
        }

        /* Controles */
        .controles {
            margin: 15px 0 0 0;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: #222222;
            padding: 12px;
            border-radius: 4px;
        }

        .seletor-grupo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--texto-secundario);
        }

        select {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--borda);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--texto-principal);
            cursor: pointer;
            outline: none;
        }

        /* Botões */
        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-inserir {
            background-color: var(--netflix-red);
            color: white;
        }
        .btn-inserir:hover { background-color: var(--netflix-red-hover); }

        .btn-backup-gerar {
            background-color: #10b981; /* Verde esmeralda */
            color: white;
        }
        .btn-backup-gerar:hover { background-color: #059669; }

        .btn-backup-importar {
            background-color: #3b82f6; /* Azul moderno */
            color: white;
        }
        .btn-backup-importar:hover { background-color: #2563eb; }

        .btn-compartilhar {
            background-color: #ffffff;
            color: #000000;
        }
        .btn-compartilhar:hover { background-color: #e6e6e6; }
        
        .btn-limpar {
            background-color: transparent;
            color: var(--texto-secundario);
            border: 1px solid var(--borda);
            margin-left: auto;
        }
        .btn-limpar:hover { background-color: rgba(255,255,255,0.05); color: #fff; }

        .btn-apagar-linha {
            background-color: rgba(229, 9, 20, 0.1);
            color: var(--netflix-red);
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid rgba(229, 9, 20, 0.3);
        }
        .btn-apagar-linha:hover { background-color: var(--netflix-red); color: white; }

        /* Painel de Controle e Busca */
        .pesquisa-container {
            margin-bottom: 20px;
            background: #222222;
            padding: 15px;
            border-radius: 4px;
        }

        .input-pesquisa {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--texto-principal);
            background-color: #262626;
            border: 1px solid var(--borda);
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .input-pesquisa:focus {
            outline: none;
            border-color: var(--netflix-red);
            background-color: var(--input-bg);
        }

        /* Área da Tabela com Logo de Fundo */
        .table-container-wrapper {
            position: relative;
            min-height: 200px;
            margin-top: 15px;
        }

        .bg-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(225, 9, 20, 0.04);
            letter-spacing: -5px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }

        .table-responsive {
            position: relative;
            z-index: 1;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: transparent;
        }

        th {
            background-color: rgba(0, 0, 0, 0.4);
            color: var(--texto-secundario);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 14px 16px;
            border-bottom: 2px solid var(--borda);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--borda);
            font-size: 14px;
            color: var(--texto-principal);
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }
        
        .tabela-contas {
            counter-reset: linha-contador;
        }
        .numero-linha::before {
            counter-increment: linha-contador;
            content: counter(linha-contador);
            font-weight: bold;
            color: #555555;
        }

        .celula-email { font-weight: 500; }
        .celula-senha { font-family: monospace; color: #888; }

        /* Inputs de Texto na Tabela */
        .input-tabela {
            padding: 8px 12px;
            border: 1px solid var(--borda);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
            color: var(--texto-principal);
            background-color: rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .input-tabela:focus {
            outline: none;
            border-color: var(--netflix-red);
            background-color: var(--input-bg);
        }

        .w-pagamento { width: 100%; max-width: 280px; }
        .w-val { width: 85px; text-align: center; }
    </style>
</head>
<body>

    <div class="header-brand">
        <div class="logo">BKLOGINS</div>
    </div>

    <div class="grid-insercao">
        <!-- LADO ESQUERDO: ENTRADA BRUTA -->
        <div class="container">
            <h2>📥 Inserir em Massa (Novas Contas)</h2>
            <textarea id="listaContas" placeholder="Cole logins brutos aqui. Exemplo:
usuario1@email.com:senha123
usuario2@email.com;senha456"></textarea>
            
            <div class="controles">
                <div class="seletor-grupo">
                    <label for="divisor">Divisor:</label>
                    <select id="divisor">
                        <option value=":">Dois Pontos (:)</option>
                        <option value=";">Ponto e Vírgula (;)</option>
                        <option value="|">Barra Vertical (|)</option>
                        <option value=",">Vírgula (,)</option>
                    </select>
                </div>
                <button class="btn-inserir" onclick="processarLista()">Inserir</button>
            </div>
        </div>

        <!-- LADO DIREITO: SISTEMA DE BACKUP -->
        <div class="container">
            <h2>🔄 Sistema de Backup (Salva 100% Igual)</h2>
            <textarea id="areaBackup" placeholder="Para RESTAURAR: Cole o código de backup aqui e clique em 'Importar Backup'.
Para GERAR: Deixe o campo vazio e clique em 'Gerar Backup'."></textarea>
            
            <div class="controles">
                <button class="btn-backup-gerar" onclick="gerarBackup()">Gerar Backup</button>
                <button class="btn-backup-importar" onclick="importarBackup()">Importar Backup</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="pesquisa-container">
            <h2>🔍 Painel de Controle e Busca</h2>
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="campoPesquisa" class="input-pesquisa" style="flex: 1; min-width: 250px;" placeholder="Pesquise por e-mail ou forma de pagamento..." oninput="filtrarTabela()">
                <button class="btn-compartilhar" onclick="compartilharDados()">Copiar Lista Simplificada</button>
                <button class="btn-limpar" onclick="limparTodaTabela()">Limpar Tudo</button>
            </div>
        </div>

        <h2>📋 Contas Ativas</h2>
        
        <div class="table-container-wrapper">
            <div class="bg-watermark">BK</div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">#</th>
                            <th>Email</th>
                            <th>Senha</th>
                            <th>Forma de Pagamento</th>
                            <th style="width: 100px;">Data</th>
                            <th style="width: 90px; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela" class="tabela-contas">
                        <!-- As linhas aparecem aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', carregarDadosSalvos);

        function processarLista() {
            const textarea = document.getElementById('listaContas');
            const divisor = document.getElementById('divisor').value;
            const lines = textarea.value.trim().split('\n');

            if (textarea.value.trim() === '') {
                alert('Por favor, cole sua lista de logins.');
                return;
            }

            lines.forEach(line => {
                if (line.trim() === '') return;
                const parts = line.split(divisor);
                
                if (parts.length >= 2) {
                    const email = parts[0].trim();
                    const senha = parts[1].trim();
                    adicionarLinhaNaTabela(email, senha, '', '');
                }
            });

            textarea.value = '';
            salvarDados();
            limparFiltros();
        }

        // ====================== NOVO SISTEMA DE BACKUP PERFEITO ======================
        
        // 1. GERAR BACKUP INDESTRUTÍVEL
        function gerarBackup() {
            const linhas = document.querySelectorAll('#corpoTabela tr');
            const dadosBackup = [];

            linhas.forEach(linha => {
                const email = linha.querySelector('.celula-email').innerText;
                const senha = linha.querySelector('.celula-senha').innerText;
                const pagamento = linha.querySelector('.w-pagamento').value;
                const data = linha.querySelector('.w-val').value;

                dadosBackup.push({ email, senha, pagamento, data });
            });

            if (dadosBackup.length === 0) {
                alert('A tabela está vazia. Não há nada para fazer backup.');
                return;
            }

            // Transforma o array em uma linha codificada de texto JSON pura
            const codigoCodificado = btoa(unescape(encodeURIComponent(JSON.stringify(dadosBackup))));
            
            const areaBackup = document.getElementById('areaBackup');
            areaBackup.value = codigoCodificado;
            
            // Copia automaticamente para a área de transferência do seu PC
            navigator.clipboard.writeText(codigoCodificado).then(() => {
                alert('Código de Backup gerado e copiado automaticamente! Salve esse texto onde quiser.');
            });
        }

        // 2. IMPORTAR/RESTAURAR BACKUP 100% IGUAL
        function importarBackup() {
            const areaBackup = document.getElementById('areaBackup');
            const codigo = areaBackup.value.trim();

            if (codigo === '') {
                alert('Por favor, cole o código de backup gerado anteriormente na caixa.');
                return;
            }

            try {
                // Decodifica o texto seguro de volta para dados reais
                const dadosDecodificados = JSON.parse(decodeURIComponent(escape(atob(codigo))));
                
                if (Array.isArray(dadosDecodificados)) {
                    dadosDecodificados.forEach(conta => {
                        adicionarLinhaNaTabela(conta.email, conta.senha, conta.pagamento || '', conta.data || '');
                    });

                    areaBackup.value = '';
                    salvarDados();
                    limparFiltros();
                    alert(`Backup restaurado! ${dadosDecodificados.length} contas reinseridas com sucesso absoluto.`);
                } else {
                    alert('Código de backup inválido.');
                }
            } catch (erro) {
                alert('Não foi possível ler este backup. Verifique se copiou o código completo.');
            }
        }

        // =============================================================================

        function adicionarLinhaNaTabela(email, senha, pagamento, data) {
            const corpoTabela = document.getElementById('corpoTabela');
            const novaLinha = document.createElement('tr');

            novaLinha.innerHTML = `
                <td class="numero-linha"></td>
                <td class="celula-email">${email}</td>
                <td class="celula-senha">${senha}</td>
                <td>
                    <input type="text" class="input-tabela w-pagamento" value="${pagamento}" placeholder="Digite a forma de pagamento..." oninput="salvarDados(); filtrarTabela();">
                </td>
                <td>
                    <input type="text" class="input-tabela w-val" value="${data}" placeholder="MM/AA" maxlength="5" oninput="salvarDados()">
                </td>
                <td style="text-align: center;">
                    <button class="btn-apagar-linha" onclick="apagarLinha(this)">Apagar</button>
                </td>
            `;

            corpoTabela.appendChild(novaLinha);
        }

        function apagarLinha(botao) {
            const row = botao.closest('tr');
            row.style.opacity = '0';
            row.style.transform = 'scale(0.95)';
            row.style.transition = 'all 0.2s ease';
            setTimeout(() => {
                row.remove();
                salvarDados();
            }, 200);
        }

        function filtrarTabela() {
            const termoBusca = document.getElementById('campoPesquisa').value.toLowerCase().trim();
            const linhas = document.querySelectorAll('#corpoTabela tr');

            linhas.forEach(linha => {
                const email = linha.querySelector('.celula-email').innerText.toLowerCase();
                const pagamento = linha.querySelector('.w-pagamento').value.toLowerCase();

                if (email.includes(termoBusca) || pagamento.includes(termoBusca)) {
                    linha.style.display = '';
                } else {
                    linha.style.display = 'none';
                }
            });
        }

        function limparFiltros() {
            document.getElementById('campoPesquisa').value = '';
            filtrarTabela();
        }

        function salvarDados() {
            const linhas = document.querySelectorAll('#corpoTabela tr');
            const dadosParaSalvar = [];

            linhas.forEach(linha => {
                const email = linha.querySelector('.celula-email').innerText;
                const senha = linha.querySelector('.celula-senha').innerText;
                const pagamento = linha.querySelector('.w-pagamento').value;
                const data = linha.querySelector('.w-val').value;

                dadosParaSalvar.push({ email, senha, pagamento, data });
            });

            localStorage.setItem('dadosContasE_Cartoes_v2', JSON.stringify(dadosParaSalvar));
        }

        function carregarDadosSalvos() {
            const dadosSalvos = localStorage.getItem('dadosContasE_Cartoes_v2');
            
            if (dadosSalvos) {
                const listaContas = JSON.parse(dadosSalvos);
                listaContas.forEach(conta => {
                    adicionarLinhaNaTabela(conta.email, conta.senha, conta.pagamento || '', conta.data || '');
                });
            }
        }

        function limparTodaTabela() {
            if (confirm('Tem certeza que deseja apagar TODAS as contas?')) {
                localStorage.removeItem('dadosContasE_Cartoes_v2');
                document.getElementById('corpoTabela').innerHTML = '';
                limparFiltros();
            }
        }

        function compartilharDados() {
            const linhas = document.querySelectorAll('#corpoTabela tr');
            
            if(linhas.length === 0) {
                alert('Nenhum dado para copiar.');
                return;
            }

            let textoCompleto = "--- BKLOGINS - LISTA EXPORTADA ---\n\n";

            linhas.forEach((linha, index) => {
                const email = linha.querySelector('.celula-email').innerText;
                const senha = linha.querySelector('.celula-senha').innerText;
                const pagamento = linha.querySelector('.w-pagamento').value || 'Não informado';
                const data = linha.querySelector('.w-val').value || 'Sem data';

                textoCompleto += `#${index + 1} | ${email} | ${senha} | Pagamento: ${pagamento} | Data: ${data}\n`;
            });

            navigator.clipboard.writeText(textoCompleto).then(() => {
                alert('Lista visual copiada! (Apenas para leitura).');
            }).catch(err => {
                alert('Erro ao copiar: ', err);
            });
        }
    </script>

</body>
</html>
